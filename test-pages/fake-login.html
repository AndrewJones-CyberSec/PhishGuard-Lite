<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PhishGuard Lite Test Login</title>
    <style>
      :root {
        font-family: Arial, sans-serif;
        color: #1f2937;
        background: #f3f4f6;
      }

      body {
        display: grid;
        place-items: center;
        min-height: 100vh;
        margin: 0;
        padding: 24px;
      }

      main {
        width: min(420px, 100%);
        padding: 24px;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        background: #ffffff;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 24px;
      }

      p {
        margin: 0 0 18px;
        color: #4b5563;
        line-height: 1.5;
      }

      label {
        display: grid;
        gap: 6px;
        margin-bottom: 12px;
        font-weight: 700;
      }

      input {
        width: 100%;
        padding: 10px;
        border: 1px solid #9ca3af;
        border-radius: 6px;
        font: inherit;
      }

      button {
        width: 100%;
        padding: 11px;
        border: 0;
        border-radius: 6px;
        background: #1d4ed8;
        color: #ffffff;
        font: inherit;
        font-weight: 700;
      }

      .note {
        margin-top: 14px;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Training Login Form</h1>
      <p>This local page intentionally includes safe phishing indicators for testing the extension.</p>

      <form action="http://192.0.2.10/collect" method="post">
        <label>
          Email
          <input type="email" name="email" autocomplete="username">
        </label>
        <label>
          Password
          <input type="password" name="password" autocomplete="current-password">
        </label>
        <button type="button">Training Button</button>
      </form>

      <p class="note">The button is type="button", so this page does not submit anything. Do not enter real credentials into test pages.</p>
    </main>
  </body>
</html>
